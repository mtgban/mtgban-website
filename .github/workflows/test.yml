name: test

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  # Fetch and cache the MTGJSON AllPrintings datastore via the reusable
  # workflow in the go-mtgban companion repo. We don't pass `game` (the
  # extra B2 upload + production ping is the go-mtgban repo's job, not
  # ours) — we just consume the cached .xz and decompress it for tests.
  cache-datastore:
    uses: mtgban/go-mtgban/.github/workflows/cache-file.yml@master
    with:
      url: ${{ vars.DATASTORE_MAGIC }}
      path: "datastore/"
    secrets: inherit

  test:
    needs: [cache-datastore]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Restore datastore cache
        uses: actions/cache/restore@v5
        with:
          path: "datastore/"
          key: ${{ needs.cache-datastore.outputs.key }}
          fail-on-cache-miss: true

      - name: Decompress datastore
        run: xz -dc ${{ needs.cache-datastore.outputs.filepath }} > allprintings5.json

      - name: go build ./...
        run: go build ./...

      - name: go vet ./...
        run: go vet ./...

      - name: go test ./...
        run: go test ./...
