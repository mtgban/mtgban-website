name: test

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Compute datastore cache key
        id: ds
        run: |
          etag=$(curl -sI "${{ vars.DATASTORE_MAGIC }}" | grep -i etag | tr -d '\r"' | cut -f 2 -d " ")
          base=$(basename "${{ vars.DATASTORE_MAGIC }}" | cut -d? -f1)
          echo "key=$base-$etag" >> "$GITHUB_OUTPUT"
          echo "filepath=datastore/$base" >> "$GITHUB_OUTPUT"

      - name: Cache datastore
        id: cache
        uses: actions/cache@v5
        with:
          path: "datastore/"
          key: ${{ steps.ds.outputs.key }}

      - name: Download datastore (cache miss)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p datastore/
          curl -L "${{ vars.DATASTORE_MAGIC }}" -o "${{ steps.ds.outputs.filepath }}"

      - name: Decompress datastore
        run: xz -dc "${{ steps.ds.outputs.filepath }}" > allprintings5.json

      - name: go build ./...
        run: go build ./...

      - name: go vet ./...
        run: go vet ./...

      - name: go test ./...
        run: go test ./...
