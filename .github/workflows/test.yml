name: test

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # MTGJSON AllPrintings is public, so the URL is inlined here. It used to
      # come from the org-level vars.DATASTORE_MAGIC, but GitHub does not expose
      # variables to pull_request runs from forks (it resolved empty, leaving an
      # empty curl URL and failing every fork PR).
      DATASTORE_URL: https://mtgjson.com/api/v5/AllPrintings.json.xz
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Compute datastore cache key
        id: ds
        run: |
          etag=$(curl -sI "$DATASTORE_URL" | grep -i etag | tr -d '\r"' | cut -f 2 -d " ")
          base=$(basename "$DATASTORE_URL" | cut -d? -f1)
          echo "key=$base-$etag" >> "$GITHUB_OUTPUT"
          echo "filepath=datastore/$base" >> "$GITHUB_OUTPUT"

      - name: Cache datastore
        id: cache
        uses: actions/cache@v5
        with:
          path: "datastore/"
          key: ${{ steps.ds.outputs.key }}

      - name: Download datastore (cache miss)
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p datastore/
          curl -L "$DATASTORE_URL" -o "${{ steps.ds.outputs.filepath }}"

      - name: Decompress datastore
        run: xz -dc "${{ steps.ds.outputs.filepath }}" > allprintings5.json

      - name: go build ./...
        run: go build ./...

      - name: go vet ./...
        run: go vet ./...

      - name: go test ./...
        run: go test ./...
