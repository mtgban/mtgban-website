name: lorcana-deploy

on:
  push:
    tags:
      - 'v*'
      - 'lorcana-*'
  workflow_dispatch:

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Install doctl
        uses: digitalocean/action-doctl@v2.5.1
        with:
          token: ${{ secrets.DO_API_TOKEN }}

      - name: Create deployment
        run: doctl apps create-deployment ${{ secrets.DO_LORCANA_APP_ID }} --wait

