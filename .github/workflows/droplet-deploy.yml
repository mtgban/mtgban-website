name: droplet-deploy

on:
  push:
    tags:
      - 'v*.*.*'
      - 'beta-*.*.*'
  workflow_dispatch:
    inputs:
      ref:
        description: "Git tag/branch to deploy"
        required: true

permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to droplet over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_SSH_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -e
            REF="${{ github.event.inputs.ref || github.ref_name }}"
            # Update the control repo so we run this ref's deploy.sh. Nothing
            # serves from this dir — it's just the orchestrator; the script
            # checks out and builds the per-port runtime checkouts itself.
            cd /home/koda/src/mtgban-website
            git fetch --force --prune --tags origin "$REF"
            git checkout --force FETCH_HEAD
            deploy/deploy.sh "$REF"
