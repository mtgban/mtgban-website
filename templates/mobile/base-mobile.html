<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="stylesheet" type="text/css" href="/css/main.css?hash={{.Hash}}">
    <link rel="stylesheet" type="text/css" href="/css/mobile.css?hash={{.Hash}}">
    {{block "extra-css" .}}{{end}}

    <link rel="apple-touch-icon" sizes="120x120" href="/img/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/img/favicon/favicon-16x16.png">
    <link rel="manifest" href="/img/favicon/site.webmanifest">
    <link rel="shortcut icon" href="/img/favicon/favicon.ico">
    <meta name="theme-color" content="#ff0000">

    {{block "extra-meta" .}}{{end}}

    <title>{{block "title" .}}{{.Title}}{{end}}</title>

    {{block "extra-head" .}}{{end}}
</head>

<body class="light-theme mobile">
{{template "navbar" .}}

<div class="page-content">
    {{if ne .ErrorMessage ""}}
        <div class="page-error">{{.ErrorMessage}}</div>
    {{else}}
        {{block "content" .}}{{end}}
    {{end}}
</div>

{{block "extra-scripts" .}}{{end}}
</body>
</html>
