{{define "navbar"}}
<nav class="ban-nav">
    <ul class="ban-nav-links">
        {{range .Nav}}
        <li>
            <a class="{{.Class}}" href="{{.Link}}">
                <span class="nav-icon">{{.Short}}</span>
                <span class="nav-full">{{.Name}}</span>
                <span class="nav-short">{{.Name}}</span>
            </a>
        </li>
        {{end}}
    </ul>

    <div class="ban-nav-spacer"></div>

    <div class="ban-nav-right">
        {{if .BetaNav}}
        <a class="{{.BetaNav.Class}}" href="{{.BetaNav.Link}}">
            <span class="nav-icon">{{.BetaNav.Short}}</span>
        </a>
        {{end}}
        <a class="ban-nav-ext" href="https://www.patreon.com/mtgban" title="Patreon">
            <img src="/img/misc/patreon.png" alt="Patreon">
        </a>
        <a class="ban-nav-ext" {{if .PatreonLogin}}style="display:none"{{end}} href="/discord" title="Discord">
            <img src="/img/misc/discord.png" alt="Discord">
        </a>

        <a class="ban-nav-ext" href="/guide" title="Guide">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--greytext)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
        </a>
        <button class="ban-theme-toggle" id="theme-toggle" type="button" title="Toggle theme">
            <svg class="theme-icon theme-icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#ffdd00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
            <svg class="theme-icon theme-icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1a5ea6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"/></svg>
        </button>
        <script type="text/javascript" src="/js/nightmode.js?hash={{.Hash}}"></script>

        <a class="ban-settings-btn is-disabled" id="nav-settings-btn" href="?settings=1" title="No settings on this page" aria-disabled="true" tabindex="-1" onclick="if(window.openSettings && !this.classList.contains('is-disabled')){event.preventDefault();window.openSettings();return false;}return false;">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--greytext)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </a>

        <button class="ban-nav-hamburger" onclick="document.getElementById('mobile-menu').classList.add('open'); document.getElementById('mobile-overlay').classList.add('open');">&#9776;</button>
    </div>
</nav>

<div class="ban-nav-mobile-overlay" id="mobile-overlay" onclick="this.classList.remove('open'); document.getElementById('mobile-menu').classList.remove('open');"></div>
<div class="ban-nav-mobile-menu" id="mobile-menu">
    <button class="ban-nav-mobile-close" onclick="this.parentElement.classList.remove('open'); document.getElementById('mobile-overlay').classList.remove('open');">&#10005;</button>
    <ul class="ban-nav-mobile-links">
        {{range .Nav}}
        <li>
            <a class="{{.Class}}" href="{{.Link}}">
                <span class="nav-icon">{{.Short}}</span> {{.Name}}
            </a>
        </li>
        {{end}}
    </ul>
    <hr class="ban-nav-mobile-divider">
    <div class="ban-nav-mobile-ext">
        <a href="https://www.patreon.com/mtgban"><img src="/img/misc/patreon.png" alt="Patreon"></a>
        <a {{if .PatreonLogin}}style="display:none"{{end}} href="/discord"><img src="/img/misc/discord.png" alt="Discord"></a>
    </div>
    <hr class="ban-nav-mobile-divider">
    <a style="padding: 8px 12px; font-size: 0.85rem; color: var(--greytext); text-decoration: none;" href="#" onclick="window.location='/toggle-mobile?redirect='+encodeURIComponent(window.location.pathname+window.location.search); return false;">Switch to Mobile View</a>
</div>
{{end}}
